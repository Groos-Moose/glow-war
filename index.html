<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glow War</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; background: #0a0a1a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    fetch('war-game-v168.jsx')
      .then(r => r.text())
      .then(code => {
        try {
          // Strip ES module import/export — React is loaded globally via UMD
          const stripped = code
            .replace(/^import\s+React.*?from\s+['"]react['"];?\n?/m,
              'const {useState,useEffect,useRef,useCallback,useMemo,useContext,useReducer,useLayoutEffect}=React;\n')
            .replace(/^export\s+default\s+/m, 'const __GlowWarGame = ');
          const transformed = Babel.transform(stripped, {
            presets: ['react'],
            filename: 'war-game-v168.jsx'
          }).code;
          // eslint-disable-next-line no-new-func
          new Function('React', 'ReactDOM', transformed + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(__GlowWarGame));')(React, ReactDOM);
        } catch(err) {
          document.getElementById('root').innerHTML =
            '<div style="color:#f88;font-family:monospace;padding:20px;white-space:pre-wrap">' +
            '<b>Transform/render error:</b>\n' + err.message + '\n\n' + (err.stack||'') + '</div>';
        }
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<div style="color:#f88;font-family:monospace;padding:20px;white-space:pre-wrap">' +
          '<b>Fetch error:</b> ' + err.message + '</div>';
      });
  </script>
</body>
</html>
